name: Run Mpanisa Bot

on:
  schedule:
    - cron: '45 13 * * 5'  # Vendredi 16h45 Madagascar
    - cron: '15 6 * * 0'   # Dimanche 09h15 Madagascar
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 170
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        run: python bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROUP_ID: ${{ secrets.GROUP_ID }}
